<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Globe base (grey ocean) -->
  <circle cx="150" cy="150" r="148" fill="#757b86"/>

  <!-- Large red landmass covering most of the Eastern hemisphere view -->
  <path d="
    M60,50  C80,30 110,22 150,22 C190,22 225,35 252,58
    C275,78 285,108 282,140 C278,172 265,200 245,220
    C225,240 200,252 175,258 C155,262 138,258 122,250
    C100,240 82,220 68,195 C52,168 44,138 46,108
    C48,80 52,66 60,50 Z
  " fill="#8b1c1c"/>

  <!-- Atlantic Ocean cutout (left edge) -->
  <path d="
    M46,108 C40,130 40,158 50,185 C40,165 36,140 38,112 Z
  " fill="#757b86"/>

  <!-- Some subtle ocean highlights to break up the mass -->
  <ellipse cx="88" cy="72" rx="14" ry="8" fill="#757b86" opacity="0.35"/>
  <ellipse cx="230" cy="85" rx="10" ry="6" fill="#757b86" opacity="0.25"/>

  <!-- ══════════════ ASHUR EAGLE ══════════════ -->

  <!-- Left wing: smooth curved wing shape -->
  <path d="
    M136,178
    C116,172 92,164 66,158
    C46,153 26,153 12,160
    C10,163 12,167 16,168
    C30,170 50,170 70,172
    C94,175 118,178 136,182 Z
  " fill="#c8a000"/>

  <!-- Left wing upper feather edge (3 gentle bumps) -->
  <path d="
    M136,178 C128,172 122,162 114,158 C108,163 105,172 110,178
    C118,174 128,174 136,178 Z
  " fill="#d4aa00"/>
  <path d="
    M110,177 C100,171 92,160 82,156 C74,161 72,172 78,177
    C88,174 100,174 110,177 Z
  " fill="#c8a000"/>
  <path d="
    M78,176 C66,170 56,160 44,156 C36,161 34,173 40,177
    C52,174 66,174 78,176 Z
  " fill="#c8a000"/>

  <!-- Right wing: mirror -->
  <path d="
    M164,178
    C184,172 208,164 234,158
    C254,153 274,153 288,160
    C290,163 288,167 284,168
    C270,170 250,170 230,172
    C206,175 182,178 164,182 Z
  " fill="#c8a000"/>

  <!-- Right wing upper feather edge -->
  <path d="
    M164,178 C172,172 178,162 186,158 C192,163 195,172 190,178
    C182,174 172,174 164,178 Z
  " fill="#d4aa00"/>
  <path d="
    M190,177 C200,171 208,160 218,156 C226,161 228,172 222,177
    C212,174 200,174 190,177 Z
  " fill="#c8a000"/>
  <path d="
    M222,176 C234,170 244,160 256,156 C264,161 266,173 260,177
    C248,174 234,174 222,176 Z
  " fill="#c8a000"/>

  <!-- Central disc -->
  <circle cx="150" cy="176" r="18" fill="#c8a000"/>
  <circle cx="150" cy="176" r="12" fill="#7a5a00"/>
  <circle cx="150" cy="176" r="6"  fill="#c8a000"/>

  <!-- Flame / head above body -->
  <path d="M143,160 C145,148 150,138 150,132 C150,138 155,148 157,160
           C155,164 152,166 150,166 C148,166 145,164 143,160 Z"
        fill="#e8c000"/>
  <path d="M147,156 C148,147 150,140 150,136 C150,140 152,147 153,156
           C152,159 150,160 150,160 C150,160 148,159 147,156 Z"
        fill="#ff9900"/>

  <!-- Small decorative stars below -->
  <circle cx="134" cy="198" r="2.5" fill="#d4aa00"/>
  <circle cx="142" cy="200" r="2.5" fill="#d4aa00"/>
  <circle cx="150" cy="201" r="2.5" fill="#d4aa00"/>
  <circle cx="158" cy="200" r="2.5" fill="#d4aa00"/>
  <circle cx="166" cy="198" r="2.5" fill="#d4aa00"/>

  <!-- Globe border ring -->
  <circle cx="150" cy="150" r="148" fill="none" stroke="#555b66" stroke-width="3"/>
</svg>
