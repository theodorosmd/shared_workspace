           C22,177 38,179 56,179 C82,178 110,177 134,180 Z"
        fill="#b89200"/>

  <!-- Left wing feathers (4 upward-pointing primary feathers) -->
  <path d="M128,176 L118,153 L108,176 Z" fill="#d4a800"/>
  <path d="M108,176 L96,149 L84,176 Z" fill="#c8a000"/>
  <path d="M84,176 L70,147 L56,176 Z" fill="#c8a000"/>
  <path d="M56,176 L42,150 L28,176 Z" fill="#c8a000"/>

  <!-- Wing base bar (right, mirror) -->
  <path d="M166,175 C190,172 218,168 244,166 C262,165 278,167 286,172
           C278,177 262,179 244,179 C218,178 190,177 166,180 Z"
        fill="#b89200"/>

  <!-- Right wing feathers (mirror) -->
  <path d="M172,176 L182,153 L192,176 Z" fill="#d4a800"/>
  <path d="M192,176 L204,149 L216,176 Z" fill="#c8a000"/>
  <path d="M216,176 L230,147 L244,176 Z" fill="#c8a000"/>
  <path d="M244,176 L258,150 L272,176 Z" fill="#c8a000"/>

  <!-- Central disc ring -->
  <circle cx="150" cy="174" r="17" fill="#c8a000"/>
  <circle cx="150" cy="174" r="12" fill="#8b6800"/>
  <circle cx="150" cy="174" r="7" fill="#c8a000"/>

  <!-- Flame on top -->
  <path d="M144,158 Q148,142 150,136 Q152,142 156,158 Q153,162 150,163 Q147,162 144,158 Z" fill="#e8c000"/>
  <path d="M147,153 Q150,142 153,153 Q151,157 150,158 Q149,157 147,153 Z" fill="#ff9900"/>

  <!-- Stars below -->
  <circle cx="133" cy="196" r="2.2" fill="#d4a800"/>
  <circle cx="141" cy="198" r="2.2" fill="#d4a800"/>
  <circle cx="150" cy="199" r="2.2" fill="#d4a800"/>
  <circle cx="159" cy="198" r="2.2" fill="#d4a800"/>
  <circle cx="167" cy="196" r="2.2" fill="#d4a800"/>

  <!-- Globe border -->
  <circle cx="150" cy="150" r="148" fill="none" stroke="#5a6070" stroke-width="2.5"/>
</svg>
