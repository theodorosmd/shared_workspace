  <path d="M116,110 Q132,100 156,96 Q166,95 172,100 Q162,104 148,108 Q132,112 118,114 Z" fill="#c8a000"/>
  <path d="M114,115 Q130,112 150,112 Q162,113 168,118 Q156,118 144,117 Q128,116 115,118 Z" fill="#c8a000"/>
