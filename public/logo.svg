    M88,52 Q105,42 128,40 Q152,38 172,44 Q195,40 218,50
    Q242,58 255,75 Q265,90 260,108 Q270,122 265,140
    Q272,155 265,172 Q258,188 245,192 Q235,200 222,195
    Q212,202 200,198 Q190,204 178,200 Q166,196 158,204
    Q150,212 140,208 Q130,204 122,212 Q112,220 102,213
    Q92,206 94,190 Q96,175 86,163 Q76,152 80,136
    Q84,120 74,107 Q65,94 70,78 Q76,63 88,52 Z
  " fill="#8b1c1c" opacity="0.92"/>

  <!-- Africa -->
  <path d="
    M118,205 Q130,198 143,205 Q152,212 157,228
    Q162,246 160,265 Q157,280 150,288 Q142,280 136,264
    Q128,246 120,228 Q114,214 118,205 Z
  " fill="#8b1c1c" opacity="0.9"/>

