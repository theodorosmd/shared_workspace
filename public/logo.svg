<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Globe base -->
  <circle cx="150" cy="150" r="148" fill="#757b86"/>

  <!-- Landmass: Eurasia (one connected path approximating Europe+Asia) -->
